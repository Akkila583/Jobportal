<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">

    <title>Job Application Form</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{

    background:linear-gradient(
        to right,
        #ec4899,
        #c026d3,
        #9333ea
    );

    padding:40px;
}

        .container{

    width:60%;

    margin:auto;

    background:rgba(255,255,255,0.95);

    padding:40px;

    border-radius:25px;

    box-shadow:0px 0px 25px rgba(0,0,0,0.4);
}

        h1{

            text-align:center;

            color:#1e3a8a;

            margin-bottom:30px;
        }

        input, textarea, select{

            width:100%;

            padding:15px;

            margin-bottom:20px;

            border-radius:10px;

            border:1px solid gray;

            font-size:16px;
        }

        button{

            width:100%;

            padding:15px;

            background:#16a34a;

            color:white;

            border:none;

            border-radius:10px;

            font-size:18px;

            cursor:pointer;
        }

        button:hover{

            background:#15803d;
        }

        #success{

            display:none;

            text-align:center;

            background:#dcfce7;

            padding:40px;

            border-radius:20px;

            margin-top:30px;

            color:#166534;

            font-size:28px;

            font-weight:bold;
        }
        .analyze-btn{

    width:100%;

    padding:15px;

    background:#9333ea;

    color:white;

    border:none;

    border-radius:10px;

    font-size:18px;

    margin-bottom:20px;

    cursor:pointer;
}

.analyze-btn:hover{

    background:#7e22ce;
}

    </style>

</head>

<body>

    <div class="container">

        <h1>Job Application Form</h1>

        <form onsubmit="submitForm(event)">

            <input type="text"
                placeholder="First Name"
                required>

            <input type="text"
                placeholder="Last Name"
                required>

            <input type="email"
                placeholder="Email Address"
                required>

            <input type="tel"
                placeholder="Phone Number"
                pattern="[0-9]{10}"
                required>

            <input type="number"
                placeholder="Years of Experience"
                required>

            <input type="text"
            id="skills"
            placeholder="Enter Your Skills (Java, HTML, SQL, React)"
            required>
            <textarea
            id="resumeText"
            rows="6"
            placeholder="Paste Resume Summary Here">
            </textarea>
            

            <input type="text"
                placeholder="Previous Company (Optional)">

            <input type="text"
                placeholder="Current Location"
                required>

            <select required>

                <option value="">
                    Select Qualification
                </option>

                <option>B.Tech</option>
                <option>M.Tech</option>
                <option>BCA</option>
                <option>MCA</option>
                <option>B.Sc</option>

            </select>

            <input type="text"
        placeholder="Mention Your Previous Role and Company Name (Optional)">

            <input type="file"
            id="resume"
            accept=".txt"
            required>
        <button type="button"
        onclick="analyzeResume()"
        class="analyze-btn">

        Check Resume Score

        </button>
            <button type="submit">

                Apply

            </button>

        </form>
        

        <div id="result"
style="
display:none;
margin-top:30px;
padding:25px;
background:#ede9fe;
border-radius:15px;
font-size:20px;
line-height:1.8;
">
</div>


        <div id="success">

    🎉 Thanks For Applying 🎉

    <br><br>

    Our recruitment team will contact you soon.

    <br><br>

    Best wishes for your career 🚀

</div>

    </div>


<script>

function analyzeResume(){

    let skills =
        document.getElementById("skills")
        .value
        .toLowerCase();

    let score = 0;

    let suggestions = [];

    let jobs = [];



    if(skills.includes("java")){

        score += 25;
        jobs.push("Java Developer");
    }
    else{

        suggestions.push("Add Java skill");
    }


    if(skills.includes("html")){

        score += 20;
        jobs.push("Frontend Developer");
    }
    else{

        suggestions.push("Learn HTML/CSS");
    }


    if(skills.includes("sql")){

        score += 20;
        jobs.push("Database Engineer");
    }
    else{

        suggestions.push("Add SQL knowledge");
    }


    if(skills.includes("react")){

        score += 20;
        jobs.push("React Developer");
    }
    else{

        suggestions.push("Learn React");
    }


    if(skills.includes("aws")){

        score += 15;
        jobs.push("Cloud Engineer");
    }
    else{

        suggestions.push("Learn AWS Cloud");
    }



    let result =
        document.getElementById("result");

    result.style.display = "block";



    result.innerHTML =

        "<h2>AI Resume Analyzer</h2><br>" +

        "<b>Resume Score:</b> "
        + score + "%<br><br>" +

        "<b>Suggested Jobs:</b><br>"
        + jobs.join('<br>') +

        "<br><br>" +

        "<b>Resume Improvements:</b><br>"
        + suggestions.join('<br>');
}



function submitForm(event){

    event.preventDefault();

    document.querySelector("form")
            .style.display = "none";

    document.getElementById("result")
            .innerHTML +=

            "<br><br><h2>Thanks For Applying</h2>" +

            "Our recruitment team will contact you soon.";
}

</script>

</body>
</html>
