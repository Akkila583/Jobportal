<!DOCTYPE html>
<html>
<head>
    <title>Register Page</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background-image:url('https://images.pexels.com/photos/8191968/pexels-photo-8191968.jpeg?cs=srgb&dl=pexels-antoni-shkraba-8191968.jpg&fm=jpg');

            background-size:cover;

            background-position:center;
        }

        .container{

            width:450px;

            padding:40px;

            border-radius:20px;

            background:rgba(255,255,255,0.2);

            backdrop-filter:blur(10px);

            box-shadow:0px 0px 20px rgba(0,0,0,0.4);

            color:white;
        }

        h1{

            text-align:center;

            margin-bottom:30px;

            font-size:40px;
        }

        input{

            width:100%;

            padding:15px;

            margin-bottom:20px;

            border:none;

            border-radius:10px;

            font-size:16px;
        }

        button{

            width:100%;

            padding:15px;

            background:#1e3a8a;

            color:white;

            border:none;

            border-radius:10px;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#2563eb;
        }

        .rules{

            font-size:14px;

            margin-bottom:20px;

            line-height:1.8;
        }

        .login-link{

            text-align:center;

            margin-top:20px;
        }

        .login-link a{

            color:white;

            font-weight:bold;

            text-decoration:none;
        }

        .login-link a:hover{

            text-decoration:underline;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Register</h1>

        <form action="RegisterServlet" method="post">

            <input type="text"
            name="name"
            placeholder="Enter Full Name"
            required>

            <input type="email"
            name="email"
            placeholder="Enter Email"
            required>

            <input type="password"
            name="password"
            placeholder="Enter Password"
            pattern="^(?=.*[0-9])(?=.*[!@#$%^&*])[A-Z].{7,}$"
            title="Password must be 8 characters, first letter uppercase, include symbol and number"
            required>

            <div class="rules">

                Password must contain:

                <br><br>

                - Minimum 8 characters

                <br>

                - First letter uppercase

                <br>

                - At least one symbol

                <br>

                - At least one number

            </div>

            <button type="submit">

                Register

            </button>

        </form>

        <div class="login-link">

            Already have an account?

            <a href="login.html">

                Login

            </a>

        </div>

    </div>

</body>
</html>
