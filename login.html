<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#1e3a8a,#2563eb);
        }

        .container{
            width:900px;
            height:550px;
            background:white;
            display:flex;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0px 0px 20px rgba(0,0,0,0.4);
        }

        .left{
            width:50%;
            background:#dbeafe;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .left img{
            width:100%;
            height:100%;
            object-fit:cover;
            border-radius:15px;
        }

        .right{
            width:50%;
            padding:50px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .right h1{
            color:#1e3a8a;
            margin-bottom:10px;
            font-size:40px;
        }

        .right p{
            margin-bottom:30px;
            color:gray;
        }

        input{
            width:100%;
            padding:15px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:15px;
            background:#1e3a8a;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#2563eb;
        }

        .register-link{
            margin-top:20px;
            text-align:center;
        }

        .register-link a{
            color:#1e3a8a;
            text-decoration:none;
            font-weight:bold;
        }

        .register-link a:hover{
            text-decoration:underline;
        }

        .rules{
            margin-bottom:20px;
            color:#444;
            font-size:14px;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="left">

            <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?q=80&w=1200&auto=format&fit=crop"
                alt="Job Image">

        </div>


        <div class="right">

            <h1>Login</h1>

            <p>Welcome back to Job Portal</p>

            <form action="LoginServlet" method="post">

                <input type="email"
                name="email"
                placeholder="Enter Email"
                required>


                <input type="password"
                name="password"
                placeholder="Enter Password"
                pattern="^(?=.*[0-9])(?=.*[!@#$%^&*])[A-Z].{7,}$"
                title="Password must be 8 characters, first letter uppercase, include symbol and number"
                required>

                <div class="rules">

    Password must contain:

    <br><br>

    - Minimum 8 characters

    <br>

    - First letter uppercase

    <br>

    - At least one symbol

    <br>

    - At least one number

</div>

                <button type="submit">
                    Login
                </button>

            </form>


            <div class="register-link">

                Don't have an account?

                <a href="register.html">
                    Register
                </a>

            </div>

        </div>

    </div>

</body>
</html>
